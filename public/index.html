<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎵 Music Streaming - Spotify Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1DB954;
            --bg-dark: #000000;
            --bg-card: #181818;
            --text-primary: #ffffff;
            --text-secondary: #a7a7a7;
            --border: #282828;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
        }

        .main-content {
            flex: 1;
            overflow: hidden;
        }

        .main-view {
            height: 100%;
            overflow-y: auto;
            padding-bottom: 200px;
        }

        /* Header */
        .header {
            background: var(--bg-dark);
            padding: 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .logo-mobile {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-mobile i {
            font-size: 32px;
            color: var(--primary);
        }

        .logo-mobile h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .admin-badge {
            background: var(--primary);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
            display: none;
            cursor: pointer;
        }

        .search-bar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-bar i {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .search-bar input {
            border: none;
            outline: none;
            background: none;
            color: var(--text-primary);
            font-size: 15px;
            width: 100%;
        }

        .search-bar input::placeholder {
            color: var(--text-secondary);
        }

        /* Content */
        .content {
            padding: 24px 20px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
        }

        .view-all {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        /* Artists Grid */
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .artist-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 20px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }

        .artist-card:hover {
            background: #242424;
            border-color: var(--primary);
        }

        .artist-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            margin: 0 auto 12px;
            color: var(--bg-dark);
        }

        .artist-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist-count {
            color: var(--text-secondary);
            font-size: 11px;
        }

        /* Songs List */
        .songs-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .song-item {
            background: var(--bg-card);
            border-radius: 6px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .song-item:hover {
            border-color: var(--border);
        }

        .song-item.active {
            background: #242424;
            border-color: var(--primary);
        }

        .song-number {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            min-width: 20px;
            text-align: center;
        }

        .song-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .song-cover {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            color: var(--bg-dark);
        }

        .song-details {
            flex: 1;
            min-width: 0;
        }

        .song-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            color: var(--text-secondary);
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-actions {
            opacity: 0;
            transition: opacity 0.2s;
        }

        .song-item:hover .song-actions {
            opacity: 1;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
        }

        /* Player */
        .player {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            z-index: 1000;
        }

        .player-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .player-cover {
            width: 56px;
            height: 56px;
            border-radius: 6px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            color: var(--bg-dark);
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-info h4 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-info p {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-bar-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .time {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            min-width: 40px;
        }

        .progress-bar {
            flex: 1;
            height: 24px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .progress-bg {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 2px;
        }

        .progress-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--text-primary);
            border-radius: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
        }

        .progress-bar:hover .progress-handle {
            opacity: 1;
        }

        .player-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 20px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .control-btn:hover {
            color: var(--primary);
        }

        .control-btn.play-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary);
            color: var(--bg-dark);
            font-size: 24px;
        }

        .control-btn.play-btn:hover {
            background: #1ed760;
            transform: scale(1.05);
        }

        .control-btn.small {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .control-btn.small:hover {
            color: var(--text-primary);
        }

        .control-btn.skip-btn {
            font-size: 14px;
            font-weight: 600;
            flex-direction: column;
            gap: 0;
            color: var(--text-secondary);
        }

        .control-btn.skip-btn i {
            font-size: 18px;
        }

        .control-btn.skip-btn span {
            font-size: 9px;
        }

        .control-btn.loop-btn.active {
            color: var(--primary);
        }

        .control-btn.loop-btn.loop-one::after {
            content: '1';
            position: absolute;
            font-size: 8px;
            font-weight: 900;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            max-width: 440px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            line-height: 1;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .file-input-wrapper {
            position: relative;
            width: 100%;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            background: var(--bg-dark);
            border: 2px dashed var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .file-input-label:hover {
            border-color: var(--primary);
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg-dark);
        }

        .btn-primary:hover {
            background: #1ed760;
        }

        .btn-danger {
            background: #dc2626;
            color: var(--text-primary);
            width: auto;
            padding: 8px 16px;
            font-size: 13px;
        }

        .btn-danger:hover {
            background: #ef4444;
        }

        .songs-manage-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .manage-song-item {
            background: var(--bg-dark);
            padding: 16px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            border: 1px solid var(--border);
        }

        .manage-song-info {
            flex: 1;
            min-width: 0;
        }

        .manage-song-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .manage-song-artist {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .empty-state p {
            font-size: 14px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="main-content">
            <main class="main-view">
                <header class="header">
                    <div class="header-top">
                        <div class="logo-mobile" id="logoClick">
                            <i class="fas fa-spotify"></i>
                            <h2>Streaming</h2>
                        </div>
                        <div class="admin-badge" id="adminBadge">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                    </div>
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search songs or artists...">
                    </div>
                </header>

                <div class="content">
                    <!-- Artists Section -->
                    <section class="section">
                        <div class="section-header">
                            <h2 class="section-title">Artists</h2>
                            <span class="view-all" id="artistCount">0 artists</span>
                        </div>
                        <div class="artists-grid" id="artistsGrid"></div>
                    </section>

                    <!-- Songs Section -->
                    <section class="section">
                        <div class="section-header">
                            <h2 class="section-title">All Songs</h2>
                            <span class="view-all" id="songCount">0 songs</span>
                        </div>
                        <div class="songs-list" id="songsList"></div>
                    </section>
                </div>
            </main>
        </div>

        <!-- Player -->
        <div class="player">
            <div class="player-top">
                <div class="player-cover">
                    <i class="fas fa-music"></i>
                </div>
                <div class="player-info">
                    <h4 id="playerSongName">Select a song</h4>
                    <p id="playerArtistName">-</p>
                </div>
            </div>

            <div class="progress-bar-container">
                <span class="time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar" onclick="seek(event)">
                    <div class="progress-bg">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-handle" id="progressHandle"></div>
                </div>
                <span class="time" id="totalTime">0:00</span>
            </div>

            <div class="player-controls">
                <button class="control-btn small loop-btn" onclick="cycleLoop()" id="loopBtn" title="Loop">
                    <i class="fas fa-repeat"></i>
                </button>
                <button class="control-btn skip-btn" onclick="skipBackward()" title="Back 10s">
                    <i class="fas fa-rotate-left"></i>
                    <span>10s</span>
                </button>
                <button class="control-btn small" onclick="playPrevious()" title="Previous">
                    <i class="fas fa-backward-step"></i>
                </button>
                <button class="control-btn play-btn" onclick="togglePlay()" id="playBtn">
                    <i class="fas fa-play" id="playIcon"></i>
                </button>
                <button class="control-btn small" onclick="playNext()" title="Next">
                    <i class="fas fa-forward-step"></i>
                </button>
                <button class="control-btn skip-btn" onclick="skipForward()" title="Forward 10s">
                    <i class="fas fa-rotate-right"></i>
                    <span>10s</span>
                </button>
                <button class="control-btn small" onclick="toggleMute()" id="muteBtn" title="Mute">
                    <i class="fas fa-volume-high" id="volumeIcon"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Admin Login Modal -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Admin Login</h2>
                <button class="close-btn" onclick="closeLoginModal()">&times;</button>
            </div>
            <form onsubmit="adminLogin(event)">
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="Enter admin password" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-unlock"></i>
                    Login
                </button>
            </form>
        </div>
    </div>

    <!-- Admin Panel Modal -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Admin Panel</h2>
                <button class="close-btn" onclick="closeAdminModal()">&times;</button>
            </div>

            <div class="form-group">
                <h3 style="margin-bottom: 16px; font-size: 16px; font-weight: 600;">Upload New Song</h3>
                <form onsubmit="uploadSong(event)">
                    <div class="form-group">
                        <label class="form-label">Song Name</label>
                        <input type="text" class="form-input" id="songName" placeholder="Enter song name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Artist Name</label>
                        <input type="text" class="form-input" id="artistName" placeholder="Enter artist name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Audio File</label>
                        <div class="file-input-wrapper">
                            <label for="songFile" class="file-input-label">
                                <i class="fas fa-cloud-upload-alt" style="font-size: 20px;"></i>
                                <span id="fileLabel">Choose audio file (MP3, WAV, etc.)</span>
                            </label>
                            <input type="file" id="songFile" accept="audio/*" required onchange="updateFileLabel()">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-upload"></i>
                        Upload Song
                    </button>
                </form>
            </div>

            <div class="divider"></div>

            <div class="form-group">
                <h3 style="margin-bottom: 16px; font-size: 16px; font-weight: 600;">Manage Songs</h3>
                <div class="songs-manage-list" id="manageSongsList"></div>
            </div>

            <div class="divider"></div>

            <button class="btn btn-primary" onclick="adminLogout()">
                <i class="fas fa-sign-out-alt"></i>
                Logout
            </button>
        </div>
    </div>

    <script>
        let songs = [];
        let currentSongIndex = -1;
        let isPlaying = false;
        let audio = new Audio();
        let isAdmin = false;
        let clickCount = 0;
        let clickTimer = null;
        let loopMode = 'none';

        document.addEventListener('DOMContentLoaded', () => {
            checkAdminStatus();
            loadSongs();
            setupAudioListeners();
            setupTripleClick();
        });

        function setupTripleClick() {
            const logo = document.getElementById('logoClick');
            logo.addEventListener('click', () => {
                clickCount++;
                if (clickCount === 1) {
                    clickTimer = setTimeout(() => clickCount = 0, 1000);
                }
                if (clickCount === 3) {
                    clearTimeout(clickTimer);
                    clickCount = 0;
                    openLoginModal();
                }
            });
        }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
        }

        function openAdminModal() {
            document.getElementById('adminModal').classList.add('active');
            loadManageSongs();
        }

        function closeAdminModal() {
            document.getElementById('adminModal').classList.remove('active');
        }

        async function checkAdminStatus() {
            try {
                const response = await fetch('/api/admin/status');
                const data = await response.json();
                isAdmin = data.isAdmin;
                if (isAdmin) {
                    document.getElementById('adminBadge').style.display = 'flex';
                    document.getElementById('adminBadge').onclick = openAdminModal;
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function adminLogin(event) {
            event.preventDefault();
            const password = document.getElementById('loginPassword').value;
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                if (response.ok) {
                    isAdmin = true;
                    document.getElementById('adminBadge').style.display = 'flex';
                    document.getElementById('adminBadge').onclick = openAdminModal;
                    closeLoginModal();
                    openAdminModal();
                } else {
                    alert('Invalid password!');
                }
            } catch (error) {
                alert('Login failed!');
            }
        }

        async function adminLogout() {
            await fetch('/api/admin/logout', { method: 'POST' });
            isAdmin = false;
            document.getElementById('adminBadge').style.display = 'none';
            closeAdminModal();
        }

        function updateFileLabel() {
            const fileInput = document.getElementById('songFile');
            const label = document.getElementById('fileLabel');
            if (fileInput.files.length > 0) {
                label.textContent = fileInput.files[0].name;
            }
        }

        async function uploadSong(event) {
            event.preventDefault();
            const formData = new FormData();
            formData.append('songName', document.getElementById('songName').value);
            formData.append('artistName', document.getElementById('artistName').value);
            formData.append('songFile', document.getElementById('songFile').files[0]);

            try {
                const response = await fetch('/api/songs/upload', {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    alert('Song uploaded successfully!');
                    event.target.reset();
                    document.getElementById('fileLabel').textContent = 'Choose audio file';
                    loadSongs();
                    loadManageSongs();
                } else {
                    alert('Upload failed!');
                }
            } catch (error) {
                alert('Upload failed!');
            }
        }

        async function loadSongs() {
            try {
                const response = await fetch('/api/songs');
                songs = await response.json();
                displaySongs();
                displayArtists();
            } catch (error) {
                console.error('Error loading songs:', error);
            }
        }

        async function loadManageSongs() {
            const container = document.getElementById('manageSongsList');
            if (songs.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-music"></i><h3>No songs yet</h3></div>';
                return;
            }
            container.innerHTML = songs.map(song => `
                <div class="manage-song-item">
                    <div class="manage-song-info">
                        <div class="manage-song-name">${song.name}</div>
                        <div class="manage-song-artist">${song.artist}</div>
                    </div>
                    <button class="btn btn-danger" onclick="deleteSong('${song.id}')">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        async function deleteSong(songId) {
            if (!confirm('Delete this song?')) return;
            try {
                const response = await fetch(`/api/songs/${songId}`, { method: 'DELETE' });
                if (response.ok) {
                    loadSongs();
                    loadManageSongs();
                }
            } catch (error) {
                alert('Delete failed!');
            }
        }

        function displayArtists() {
            const artistsMap = {};
            songs.forEach(song => {
                if (!artistsMap[song.artist]) {
                    artistsMap[song.artist] = { name: song.artist, count: 0 };
                }
                artistsMap[song.artist].count++;
            });
            const artists = Object.values(artistsMap);
            const grid = document.getElementById('artistsGrid');
            document.getElementById('artistCount').textContent = `${artists.length} artists`;

            if (artists.length === 0) {
                grid.innerHTML = '<div class="empty-state"><i class="fas fa-user-music"></i><h3>No artists yet</h3></div>';
                return;
            }

            grid.innerHTML = artists.map(artist => `
                <div class="artist-card" onclick="filterByArtist('${artist.name}')">
                    <div class="artist-avatar">${artist.name.charAt(0).toUpperCase()}</div>
                    <div class="artist-name">${artist.name}</div>
                    <div class="artist-count">${artist.count} ${artist.count === 1 ? 'song' : 'songs'}</div>
                </div>
            `).join('');
        }

        function displaySongs(filteredSongs = null) {
            const songsToDisplay = filteredSongs || songs;
            const container = document.getElementById('songsList');
            document.getElementById('songCount').textContent = `${songsToDisplay.length} songs`;

            if (songsToDisplay.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-music"></i><h3>No songs found</h3></div>';
                return;
            }

            container.innerHTML = songsToDisplay.map((song, index) => `
                <div class="song-item ${currentSongIndex === songs.indexOf(song) ? 'active' : ''}" onclick="playSong(${songs.indexOf(song)})">
                    <div class="song-number">${index + 1}</div>
                    <div class="song-info">
                        <div class="song-cover"><i class="fas fa-music"></i></div>
                        <div class="song-details">
                            <div class="song-name">${song.name}</div>
                            <div class="song-artist">${song.artist}</div>
                        </div>
                    </div>
                    <div class="song-actions">
                        <button class="action-btn"><i class="fas fa-play"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function filterByArtist(artistName) {
            const filtered = songs.filter(song => song.artist === artistName);
            displaySongs(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if (!term) {
                displaySongs();
                return;
            }
            const filtered = songs.filter(song => 
                song.name.toLowerCase().includes(term) || 
                song.artist.toLowerCase().includes(term)
            );
            displaySongs(filtered);
        });

        function setupAudioListeners() {
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('ended', handleSongEnd);
            audio.addEventListener('loadedmetadata', () => {
                document.getElementById('totalTime').textContent = formatTime(audio.duration);
            });
        }

        function handleSongEnd() {
            if (loopMode === 'one') {
                audio.currentTime = 0;
                audio.play();
            } else if (loopMode === 'all' || currentSongIndex < songs.length - 1) {
                playNext();
            } else {
                isPlaying = false;
                document.getElementById('playIcon').className = 'fas fa-play';
            }
        }

        function playSong(index) {
            if (songs.length === 0) return;
            currentSongIndex = index;
            const song = songs[index];
            document.getElementById('playerSongName').textContent = song.name;
            document.getElementById('playerArtistName').textContent = song.artist;
            audio.src = song.url;
            audio.load();
            audio.play();
            isPlaying = true;
            document.getElementById('playIcon').className = 'fas fa-pause';
            displaySongs();
        }

        function togglePlay() {
            if (currentSongIndex === -1 && songs.length > 0) {
                playSong(0);
                return;
            }
            if (isPlaying) {
                audio.pause();
                document.getElementById('playIcon').className = 'fas fa-play';
            } else {
                audio.play();
                document.getElementById('playIcon').className = 'fas fa-pause';
            }
            isPlaying = !isPlaying;
        }

        function playNext() {
            if (songs.length === 0) return;
            const nextIndex = (currentSongIndex + 1) % songs.length;
            playSong(nextIndex);
        }

        function playPrevious() {
            if (songs.length === 0) return;
            const prevIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            playSong(prevIndex);
        }

        function skipForward() {
            if (currentSongIndex === -1) return;
            audio.currentTime = Math.min(audio.currentTime + 10, audio.duration);
        }

        function skipBackward() {
            if (currentSongIndex === -1) return;
            audio.currentTime = Math.max(audio.currentTime - 10, 0);
        }

        function cycleLoop() {
            const modes = ['none', 'one', 'all'];
            const currentIndex = modes.indexOf(loopMode);
            loopMode = modes[(currentIndex + 1) % modes.length];
            updateLoopButton();
        }

        function updateLoopButton() {
            const btn = document.getElementById('loopBtn');
            btn.classList.remove('active', 'loop-one');
            if (loopMode === 'one') {
                btn.classList.add('active', 'loop-one');
            } else if (loopMode === 'all') {
                btn.classList.add('active');
            }
        }

        function updateProgress() {
            if (!audio.duration) return;
            const percent = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressHandle').style.left = percent + '%';
            document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
        }

        function seek(event) {
            if (!audio.duration) return;
            const bar = document.getElementById('progressBar');
            const rect = bar.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        function toggleMute() {
            audio.muted = !audio.muted;
            document.getElementById('volumeIcon').className = audio.muted ? 'fas fa-volume-mute' : 'fas fa-volume-high';
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
    </script>
</body>
</html>
